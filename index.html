<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#05050f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>SpendWise – Smart Money Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    body{font-family:'Inter',sans-serif;min-height:100vh;background:#05050f;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
    #bgCanvas{position:fixed;inset:0;z-index:0;}
    .coin{position:fixed;pointer-events:none;z-index:1;opacity:0;animation:coinFloat linear infinite;}
    @keyframes coinFloat{0%{transform:translateY(110vh) rotate(0deg);opacity:0;}10%{opacity:.7;}90%{opacity:.5;}100%{transform:translateY(-10vh) rotate(720deg);opacity:0;}}
    .wrap{position:relative;z-index:10;width:100%;max-width:440px;padding:16px;}
    .logo-area{text-align:center;margin-bottom:24px;}
    .logo-3d{display:inline-block;width:80px;height:80px;position:relative;margin-bottom:12px;animation:logoSpin 6s ease-in-out infinite;}
    @keyframes logoSpin{0%,100%{transform:rotateY(0deg) rotateX(5deg);}25%{transform:rotateY(15deg) rotateX(10deg);}75%{transform:rotateY(-15deg) rotateX(-5deg);}}
    .logo-hex{width:80px;height:80px;background:linear-gradient(135deg,#7c3aed,#f72585,#4cc9f0);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-size:34px;animation:glowPulse 2s ease-in-out infinite;}
    @keyframes glowPulse{0%,100%{box-shadow:0 0 40px rgba(124,58,237,.8),0 0 80px rgba(247,37,133,.4);}50%{box-shadow:0 0 60px rgba(124,58,237,1),0 0 120px rgba(247,37,133,.7);}}
    .logo-ring{position:absolute;inset:-8px;border-radius:50%;border:2px solid transparent;background:linear-gradient(#05050f,#05050f) padding-box,linear-gradient(135deg,#7c3aed,#f72585,#4cc9f0,#7c3aed) border-box;animation:ringRotate 3s linear infinite;}
    @keyframes ringRotate{to{transform:rotate(360deg);}}
    .brand-name{font-size:30px;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,#fff 0%,#c084fc 40%,#f72585 70%,#4cc9f0 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;background-size:200% auto;animation:shimmer 3s linear infinite;}
    @keyframes shimmer{to{background-position:200% center;}}
    .brand-tag{color:#6b7280;font-size:12px;font-weight:500;margin-top:4px;letter-spacing:2px;text-transform:uppercase;}
    .card{background:rgba(255,255,255,.04);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.09);border-radius:24px;padding:28px;box-shadow:0 25px 60px rgba(0,0,0,.5);animation:cardIn .6s cubic-bezier(.34,1.56,.64,1);}
    @keyframes cardIn{from{opacity:0;transform:translateY(40px) scale(.95);}to{opacity:1;transform:translateY(0) scale(1);}}
    .tabs{display:flex;background:rgba(255,255,255,.05);border-radius:12px;padding:4px;margin-bottom:24px;gap:4px;}
    .tab{flex:1;padding:10px;border:none;background:transparent;color:#6b7280;font-size:14px;font-weight:700;cursor:pointer;border-radius:10px;transition:all .3s;font-family:'Inter',sans-serif;position:relative;overflow:hidden;}
    .tab::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#7c3aed,#f72585);opacity:0;transition:opacity .3s;border-radius:10px;}
    .tab.active::before{opacity:1;}.tab.active{color:#fff;box-shadow:0 4px 20px rgba(124,58,237,.5);}.tab span{position:relative;z-index:1;}
    .section{display:none;animation:fadeIn .3s ease;}.section.active{display:block;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
    .fgroup{margin-bottom:16px;}
    .flabel{display:block;font-size:11px;font-weight:700;color:#8b5cf6;letter-spacing:1px;text-transform:uppercase;margin-bottom:7px;}
    .finput-wrap{position:relative;}
    .ficon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;z-index:1;}
    .finput{width:100%;padding:13px 13px 13px 42px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#fff;font-size:16px;font-family:'Inter',sans-serif;outline:none;transition:all .25s;-webkit-appearance:none;}
    .finput::placeholder{color:#4b5563;}
    .finput:focus{border-color:#7c3aed;background:rgba(124,58,237,.12);box-shadow:0 0 0 3px rgba(124,58,237,.2);}
    .btn{width:100%;padding:15px;border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;position:relative;overflow:hidden;font-family:'Inter',sans-serif;background:linear-gradient(135deg,#7c3aed,#f72585,#4cc9f0);background-size:200% auto;animation:btnShimmer 3s linear infinite;transition:transform .2s,box-shadow .2s;margin-top:6px;letter-spacing:.5px;touch-action:manipulation;}
    @keyframes btnShimmer{to{background-position:200% center;}}
    .btn:active{transform:scale(.97);}
    .btn:disabled{opacity:.5;cursor:not-allowed;animation:none;}
    .toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-120%);z-index:9999;padding:13px 20px;border-radius:12px;font-size:14px;font-weight:700;color:#fff;transition:transform .4s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;gap:8px;white-space:nowrap;box-shadow:0 10px 40px rgba(0,0,0,.4);max-width:90vw;}
    .toast.show{transform:translateX(-50%) translateY(0);}
    .toast.success{background:linear-gradient(135deg,rgba(16,185,129,.95),rgba(5,150,105,.95));}
    .toast.error{background:linear-gradient(135deg,rgba(239,68,68,.95),rgba(220,38,38,.95));}
    .feats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px;}
    .feat{text-align:center;padding:12px 6px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;transition:all .3s;}
    .feat:active{background:rgba(124,58,237,.15);transform:scale(.95);}
    .feat-ico{font-size:20px;margin-bottom:4px;}
    .feat-txt{color:#6b7280;font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
    @media(max-width:400px){.wrap{padding:12px;}.card{padding:22px;}.brand-name{font-size:26px;}}
  </style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div class="toast" id="toast"></div>
<div class="wrap">
  <div class="logo-area">
    <div class="logo-3d"><div class="logo-hex">💎</div><div class="logo-ring"></div></div>
    <div class="brand-name">SpendWise</div>
    <div class="brand-tag">✦ Smart Money Manager ✦</div>
  </div>
  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')"><span>🔑 Login</span></button>
      <button class="tab" onclick="switchTab('signup')"><span>🚀 Sign Up</span></button>
    </div>
    <div class="section active" id="loginSec">
      <div class="fgroup"><label class="flabel">Username</label><div class="finput-wrap"><span class="ficon">👤</span><input class="finput" type="text" id="loginUsername" placeholder="Enter username" autocomplete="username" autocapitalize="none"></div></div>
      <div class="fgroup"><label class="flabel">Password</label><div class="finput-wrap"><span class="ficon">🔒</span><input class="finput" type="password" id="loginPassword" placeholder="Enter password" autocomplete="current-password"></div></div>
      <button class="btn" id="loginBtn" onclick="handleLogin()">Login to SpendWise →</button>
    </div>
    <div class="section" id="signupSec">
      <div class="fgroup"><label class="flabel">Username</label><div class="finput-wrap"><span class="ficon">👤</span><input class="finput" type="text" id="signupUsername" placeholder="Choose a username" autocapitalize="none"></div></div>
      <div class="fgroup"><label class="flabel">Email (optional)</label><div class="finput-wrap"><span class="ficon">📧</span><input class="finput" type="email" id="signupEmail" placeholder="your@email.com"></div></div>
      <div class="fgroup"><label class="flabel">Password</label><div class="finput-wrap"><span class="ficon">🔒</span><input class="finput" type="password" id="signupPassword" placeholder="Min. 6 characters"></div></div>
      <button class="btn" id="signupBtn" onclick="handleSignup()">Create My Account →</button>
    </div>
  </div>
  <div class="feats">
    <div class="feat"><div class="feat-ico">📊</div><div class="feat-txt">Charts</div></div>
    <div class="feat"><div class="feat-ico">🎯</div><div class="feat-txt">Budgets</div></div>
    <div class="feat"><div class="feat-ico">🔔</div><div class="feat-txt">Alerts</div></div>
    <div class="feat"><div class="feat-ico">⚡</div><div class="feat-txt">Instant</div></div>
  </div>
</div>
<script>
// Auto-detect API URL — works locally AND on Vercel
const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? 'http://127.0.0.1:5000'
  : '';  // empty string = same domain on Vercel

const canvas=document.getElementById('bgCanvas');
const ctx=canvas.getContext('2d');
let W,H,particles=[];
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;}
resize();window.addEventListener('resize',resize);
const COLORS=['#7c3aed','#f72585','#4cc9f0','#10b981','#fbbf24'];
class P{constructor(){this.reset();}reset(){this.x=Math.random()*W;this.y=Math.random()*H;this.vx=(Math.random()-.5)*.4;this.vy=(Math.random()-.5)*.4;this.r=Math.random()*1.8+.5;this.c=COLORS[Math.floor(Math.random()*COLORS.length)];this.o=Math.random()*.5+.2;}update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>W)this.vx*=-1;if(this.y<0||this.y>H)this.vy*=-1;}draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=this.c;ctx.globalAlpha=this.o;ctx.fill();ctx.globalAlpha=1;}}
for(let i=0;i<100;i++)particles.push(new P());
function animate(){ctx.fillStyle='rgba(5,5,15,.2)';ctx.fillRect(0,0,W,H);particles.forEach(p=>{p.update();p.draw();});for(let i=0;i<particles.length;i++)for(let j=i+1;j<particles.length;j++){const dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<90){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.strokeStyle=particles[i].c;ctx.globalAlpha=(1-d/90)*.12;ctx.lineWidth=.5;ctx.stroke();ctx.globalAlpha=1;}}requestAnimationFrame(animate);}
animate();
const coinEmojis=['💰','💵','💎','🪙','💳','📈'];
function spawnCoin(){const el=document.createElement('div');el.className='coin';el.textContent=coinEmojis[Math.floor(Math.random()*coinEmojis.length)];el.style.left=Math.random()*100+'vw';el.style.fontSize=(12+Math.random()*14)+'px';el.style.animationDuration=(10+Math.random()*10)+'s';document.body.appendChild(el);setTimeout(()=>el.remove(),22000);}
for(let i=0;i<10;i++)setTimeout(spawnCoin,i*500);
setInterval(spawnCoin,3000);
function switchTab(t){document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',(i===0)===(t==='login')));document.getElementById('loginSec').classList.toggle('active',t==='login');document.getElementById('signupSec').classList.toggle('active',t==='signup');}
function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=(type==='success'?'✅ ':'❌ ')+msg;t.className=`toast ${type} show`;setTimeout(()=>t.classList.remove('show'),3500);}
async function handleLogin(){const btn=document.getElementById('loginBtn');const username=document.getElementById('loginUsername').value.trim();const password=document.getElementById('loginPassword').value;if(!username||!password){showToast('Please fill in all fields.','error');return;}btn.disabled=true;btn.textContent='Logging in...';try{const res=await fetch(`${API}/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});const data=await res.json();if(res.ok){localStorage.setItem('token',data.token);localStorage.setItem('user_id',data.user_id);localStorage.setItem('username',data.username);showToast('Welcome, '+data.username+'! 🎉');setTimeout(()=>window.location.href='dashboard.html',900);}else showToast(data.message||'Login failed.','error');}catch(e){showToast('Cannot connect. Check your connection.','error');}btn.disabled=false;btn.textContent='Login to SpendWise →';}
async function handleSignup(){const btn=document.getElementById('signupBtn');const username=document.getElementById('signupUsername').value.trim();const email=document.getElementById('signupEmail').value.trim();const password=document.getElementById('signupPassword').value;if(!username||!password){showToast('Username and password required.','error');return;}btn.disabled=true;btn.textContent='Creating account...';try{const res=await fetch(`${API}/auth/signup`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,email,password})});const data=await res.json();if(res.ok){showToast('Account created! Please log in. 🎊');setTimeout(()=>switchTab('login'),1200);}else showToast(data.message||'Signup failed.','error');}catch(e){showToast('Cannot connect.','error');}btn.disabled=false;btn.textContent='Create My Account →';}
document.addEventListener('keydown',e=>{if(e.key==='Enter'){if(document.getElementById('loginSec').classList.contains('active'))handleLogin();else handleSignup();}});
if(localStorage.getItem('token'))window.location.href='dashboard.html';
</script>
</body>
</html>
