<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#05050f">
  <title>SpendWise - Smart Money Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    body{font-family:'Inter',sans-serif;min-height:100vh;background:#05050f;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
    #bgCanvas{position:fixed;inset:0;z-index:0;}
    .wrap{position:relative;z-index:10;width:100%;max-width:440px;padding:16px;}
    .logo-area{text-align:center;margin-bottom:24px;}
    .logo-box{display:inline-flex;width:80px;height:80px;background:linear-gradient(135deg,#7c3aed,#f72585,#4cc9f0);border-radius:20px;align-items:center;justify-content:center;margin-bottom:12px;font-size:36px;box-shadow:0 0 40px rgba(124,58,237,.8);animation:glowPulse 2s ease-in-out infinite;}
    @keyframes glowPulse{0%,100%{box-shadow:0 0 40px rgba(124,58,237,.8);}50%{box-shadow:0 0 70px rgba(247,37,133,.9);}}
    .brand-name{font-size:32px;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,#fff 0%,#c084fc 40%,#f72585 70%,#4cc9f0 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .brand-tag{color:#6b7280;font-size:12px;font-weight:600;margin-top:6px;letter-spacing:3px;text-transform:uppercase;}
    .card{background:rgba(255,255,255,.05);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:28px;box-shadow:0 25px 60px rgba(0,0,0,.5);}
    .tabs{display:flex;background:rgba(255,255,255,.05);border-radius:12px;padding:4px;margin-bottom:24px;gap:4px;}
    .tab{flex:1;padding:11px;border:none;background:transparent;color:#6b7280;font-size:14px;font-weight:700;cursor:pointer;border-radius:10px;transition:all .3s;font-family:'Inter',sans-serif;position:relative;overflow:hidden;}
    .tab::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#7c3aed,#f72585);opacity:0;transition:opacity .3s;border-radius:10px;}
    .tab.active::before{opacity:1;}.tab.active{color:#fff;}.tab span{position:relative;z-index:1;}
    .section{display:none;}.section.active{display:block;}
    .fgroup{margin-bottom:16px;}
    .flabel{display:block;font-size:11px;font-weight:700;color:#8b5cf6;letter-spacing:1px;text-transform:uppercase;margin-bottom:7px;}
    .finput{width:100%;padding:13px 16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#fff;font-size:16px;font-family:'Inter',sans-serif;outline:none;transition:all .25s;-webkit-appearance:none;}
    .finput::placeholder{color:#4b5563;}
    .finput:focus{border-color:#7c3aed;background:rgba(124,58,237,.12);box-shadow:0 0 0 3px rgba(124,58,237,.2);}
    .btn{width:100%;padding:15px;border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;background:linear-gradient(135deg,#7c3aed,#f72585,#4cc9f0);background-size:200% auto;animation:btnShimmer 3s linear infinite;transition:transform .2s;margin-top:6px;touch-action:manipulation;}
    @keyframes btnShimmer{to{background-position:200% center;}}
    .btn:active{transform:scale(.97);}
    .btn:disabled{opacity:.5;cursor:not-allowed;animation:none;}
    .toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-120%);z-index:9999;padding:13px 20px;border-radius:12px;font-size:14px;font-weight:700;color:#fff;transition:transform .4s cubic-bezier(.34,1.56,.64,1);box-shadow:0 10px 40px rgba(0,0,0,.4);max-width:90vw;text-align:center;}
    .toast.show{transform:translateX(-50%) translateY(0);}
    .toast.success{background:linear-gradient(135deg,#10b981,#059669);}
    .toast.error{background:linear-gradient(135deg,#ef4444,#dc2626);}
    .feats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px;}
    .feat{text-align:center;padding:12px 6px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:12px;}
    .feat-ico{font-size:20px;margin-bottom:4px;}
    .feat-txt{color:#6b7280;font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
  </style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div class="toast" id="toast"></div>
<div class="wrap">
  <div class="logo-area">
    <div class="logo-box">&#128142;</div>
    <div class="brand-name">SpendWise</div>
    <div class="brand-tag">Smart Money Manager</div>
  </div>
  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')"><span>Login</span></button>
      <button class="tab" onclick="switchTab('signup')"><span>Sign Up</span></button>
    </div>
    <div class="section active" id="loginSec">
      <div class="fgroup">
        <label class="flabel">Username</label>
        <input class="finput" type="text" id="loginUsername" placeholder="Enter your username" autocomplete="username" autocapitalize="none">
      </div>
      <div class="fgroup">
        <label class="flabel">Password</label>
        <input class="finput" type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password">
      </div>
      <button class="btn" id="loginBtn" onclick="handleLogin()">Login to SpendWise</button>
    </div>
    <div class="section" id="signupSec">
      <div class="fgroup">
        <label class="flabel">Username</label>
        <input class="finput" type="text" id="signupUsername" placeholder="Choose a username" autocapitalize="none">
      </div>
      <div class="fgroup">
        <label class="flabel">Email (optional)</label>
        <input class="finput" type="email" id="signupEmail" placeholder="your@email.com">
      </div>
      <div class="fgroup">
        <label class="flabel">Password</label>
        <input class="finput" type="password" id="signupPassword" placeholder="Min. 6 characters">
      </div>
      <button class="btn" id="signupBtn" onclick="handleSignup()">Create My Account</button>
    </div>
  </div>
  <div class="feats">
    <div class="feat"><div class="feat-ico">&#128202;</div><div class="feat-txt">Charts</div></div>
    <div class="feat"><div class="feat-ico">&#127919;</div><div class="feat-txt">Budgets</div></div>
    <div class="feat"><div class="feat-ico">&#128276;</div><div class="feat-txt">Alerts</div></div>
    <div class="feat"><div class="feat-ico">&#9889;</div><div class="feat-txt">Instant</div></div>
  </div>
</div>
<script>
const API = 'https://spend-wise-wls7.onrender.com';

const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;}
resize(); window.addEventListener('resize', resize);
const COLORS = ['#7c3aed','#f72585','#4cc9f0','#10b981','#fbbf24'];
class P {
  constructor(){this.reset();}
  reset(){this.x=Math.random()*W;this.y=Math.random()*H;this.vx=(Math.random()-.5)*.4;this.vy=(Math.random()-.5)*.4;this.r=Math.random()*1.8+.5;this.c=COLORS[Math.floor(Math.random()*COLORS.length)];this.o=Math.random()*.5+.2;}
  update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>W)this.vx*=-1;if(this.y<0||this.y>H)this.vy*=-1;}
  draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=this.c;ctx.globalAlpha=this.o;ctx.fill();ctx.globalAlpha=1;}
}
for(let i=0;i<100;i++) particles.push(new P());
function animate(){
  ctx.fillStyle='rgba(5,5,15,.2)';ctx.fillRect(0,0,W,H);
  particles.forEach(p=>{p.update();p.draw();});
  for(let i=0;i<particles.length;i++) for(let j=i+1;j<particles.length;j++){
    const dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<90){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.strokeStyle=particles[i].c;ctx.globalAlpha=(1-d/90)*.12;ctx.lineWidth=.5;ctx.stroke();ctx.globalAlpha=1;}
  }
  requestAnimationFrame(animate);
}
animate();

function switchTab(t){
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',(i===0)===(t==='login')));
  document.getElementById('loginSec').classList.toggle('active',t==='login');
  document.getElementById('signupSec').classList.toggle('active',t==='signup');
}

function showToast(msg, type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast '+type+' show';
  setTimeout(()=>t.classList.remove('show'),3500);
}

async function handleLogin(){
  const btn=document.getElementById('loginBtn');
  const username=document.getElementById('loginUsername').value.trim();
  const password=document.getElementById('loginPassword').value;
  if(!username||!password){showToast('Please fill in all fields.','error');return;}
  btn.disabled=true;btn.textContent='Logging in...';
  try{
    const res=await fetch(API+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
    const data=await res.json();
    if(res.ok){
      localStorage.setItem('token',data.token);
      localStorage.setItem('user_id',data.user_id);
      localStorage.setItem('username',data.username);
      showToast('Welcome back '+data.username+'!');
      setTimeout(()=>window.location.href='dashboard.html',900);
    }else showToast(data.message||'Login failed.','error');
  }catch(e){showToast('Cannot connect to server.','error');}
  btn.disabled=false;btn.textContent='Login to SpendWise';
}

async function handleSignup(){
  const btn=document.getElementById('signupBtn');
  const username=document.getElementById('signupUsername').value.trim();
  const email=document.getElementById('signupEmail').value.trim();
  const password=document.getElementById('signupPassword').value;
  if(!username||!password){showToast('Username and password required.','error');return;}
  btn.disabled=true;btn.textContent='Creating account...';
  try{
    const res=await fetch(API+'/auth/signup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,email,password})});
    const data=await res.json();
    if(res.ok){showToast('Account created! Please log in.');setTimeout(()=>switchTab('login'),1200);}
    else showToast(data.message||'Signup failed.','error');
  }catch(e){showToast('Cannot connect to server.','error');}
  btn.disabled=false;btn.textContent='Create My Account';
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    if(document.getElementById('loginSec').classList.contains('active'))handleLogin();
    else handleSignup();
  }
});

if(localStorage.getItem('token')) window.location.href='dashboard.html';
</script>
</body>
</html>
