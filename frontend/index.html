<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpendWise - Smart Money Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Inter,sans-serif;min-height:100vh;background:#05050f;display:flex;align-items:center;justify-content:center;}

.sec{display:none;}.sec.active{display:block;}
.fg{margin-bottom:14px;}
.fl{display:block;font-size:11px;font-weight:700;color:#8b5cf6;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.fi{width:100%;padding:12px 14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#fff;font-size:16px;font-family:Inter,sans-serif;outline:none;}
.fi:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.2);}

.fi-txt{color:#6b7280;font-size:10px;font-weight:600;text-transform:uppercase;margin-top:4px;}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-120%);z-index:999;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:700;color:#fff;transition:transform .3s;max-width:90vw;text-align:center;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{background:#10b981;}
.toast.error{background:#ef4444;}

<body>
<div class="toast" id="toast"></div>
<div class="wrap">
  <div class="logo">
    <div class="logo-box">SW</div>
    <div class="brand">SpendWise</div>
    <div class="tag">Smart Money Manager</div>
  </div>
  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('signup')">Sign Up</button>
    </div>
    <div class="sec active" id="loginSec">
      <div class="fg"><label class="fl">Username</label><input class="fi" type="text" id="loginUsername" placeholder="Enter your username" autocapitalize="none"></div>
      <div class="fg"><label class="fl">Password</label><input class="fi" type="password" id="loginPassword" placeholder="Enter your password"></div>
      <button class="btn" id="loginBtn" onclick="handleLogin()">Login to SpendWise</button>
    </div>
    <div class="sec" id="signupSec">
      <div class="fg"><label class="fl">Username</label><input class="fi" type="text" id="signupUsername" placeholder="Choose a username" autocapitalize="none"></div>
      <div class="fg"><label class="fl">Email (optional)</label><input class="fi" type="email" id="signupEmail" placeholder="your@email.com"></div>
      <div class="fg"><label class="fl">Password</label><input class="fi" type="password" id="signupPassword" placeholder="Min. 6 characters"></div>
      <button class="btn" id="signupBtn" onclick="handleSignup()">Create My Account</button>
    </div>
  </div>
  <div class="feats">
    <div class="feat"><div style="font-size:20px">📊</div><div class="fi-txt">Charts</div></div>
    <div class="feat"><div style="font-size:20px">🎯</div><div class="fi-txt">Budgets</div></div>
    <div class="feat"><div style="font-size:20px">🔔</div><div class="fi-txt">Alerts</div></div>
    <div class="feat"><div style="font-size:20px">⚡</div><div class="fi-txt">Fast</div></div>
  </div>
</div>
<script>
const API='https://spend-wise-wls7.onrender.com';
function switchTab(t){document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',(i===0)===(t==='login')));document.getElementById('loginSec').classList.toggle('active',t==='login');document.getElementById('signupSec').classList.toggle('active',t==='signup');}
function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type+' show';setTimeout(()=>t.classList.remove('show'),3000);}
async function handleLogin(){const btn=document.getElementById('loginBtn');const u=document.getElementById('loginUsername').value.trim();const p=document.getElementById('loginPassword').value;if(!u||!p){showToast('Fill all fields','error');return;}btn.disabled=true;btn.textContent='Logging in...';try{const r=await fetch(API+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});const d=await r.json();if(r.ok){localStorage.setItem('token',d.token);localStorage.setItem('user_id',d.user_id);localStorage.setItem('username',d.username);showToast('Welcome '+d.username+'!');setTimeout(()=>window.location.href='dashboard.html',800);}else showToast(d.message||'Login failed','error');}catch(e){showToast('Cannot connect to server','error');}btn.disabled=false;btn.textContent='Login to SpendWise';}
async function handleSignup(){const btn=document.getElementById('signupBtn');const u=document.getElementById('signupUsername').value.trim();const e=document.getElementById('signupEmail').value.trim();const p=document.getElementById('signupPassword').value;if(!u||!p){showToast('Fill all fields','error');return;}btn.disabled=true;btn.textContent='Creating...';try{const r=await fetch(API+'/auth/signup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,email:e,password:p})});const d=await r.json();if(r.ok){showToast('Account created! Login now');setTimeout(()=>switchTab('login'),1000);}else showToast(d.message||'Failed','error');}catch(e){showToast('Cannot connect to server','error');}btn.disabled=false;btn.textContent='Create My Account';}
document.addEventListener('keydown',e=>{if(e.key==='Enter'){if(document.getElementById('loginSec').classList.contains('active'))handleLogin();else handleSignup();}});
if(localStorage.getItem('token'))window.location.href='dashboard.html';
</script>
</body>
</html>
